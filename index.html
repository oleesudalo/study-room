<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>동명 열공 프로젝트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    button { touch-action: manipulation; cursor: pointer; }
    body { background-color: #f0f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    .app-container { height: 100vh; width: 56.25vh; max-width: 100vw; background: white; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcY8A8MvbKoeh8H1FVwsxkmTkKT4gii-U",
  authDomain: "dongmyeong-study.firebaseapp.com",
  projectId: "dongmyeong-study",
  storageBucket: "dongmyeong-study.firebasestorage.app",
  messagingSenderId: "1072114866393",
  appId: "1:1072114866393:web:a162826ab92f7e610706c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 입실 기록 저장 함수
    window.handleCheckIn = async () => {
      const name = document.getElementById('name').value;
      const id = document.getElementById('studentId').value;
      if (!name || !id) { alert("이름과 학번을 입력해주세요!"); return; }
      
      try {
        await setDoc(doc(db, "students", id), {
          name: name,
          checkIn: new Date().toISOString(),
          status: "in"
        });
        alert(name + "님, 입실 완료되었습니다!");
      } catch (e) {
        alert("오류 발생: " + e.message);
      }
    };
  </script>
</head>
<body>

  <div class="app-container">
    <button id="fullscreenBtn" class="absolute top-4 right-4 z-[60] bg-black/10 hover:bg-black/20 p-2 rounded-full transition-colors">
      <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
    </button>
    
    <div class="flex-grow py-4 px-6 flex flex-col items-center justify-evenly text-center w-full overflow-hidden">
      <h1 class="text-2xl font-black text-[#1e3a8a]">동명 열공 프로젝트</h1>
      
      <div class="w-full space-y-3">
        <input type="text" id="name" placeholder="이름을 입력하세요" class="w-full p-3 border rounded-xl">
        <input type="text" id="studentId" placeholder="학번을 입력하세요 (예: 10101)" class="w-full p-3 border rounded-xl">
      </div>
    </div>

    <div class="w-full border-t border-gray-100 p-3 flex gap-2">
      <button onclick="handleCheckIn()" class="flex-1 bg-blue-600 text-white font-bold text-sm py-3 rounded-xl">입실하기</button>
      <button onclick="alert('준비 중입니다!')" class="flex-[0.8] bg-emerald-600 text-white font-bold text-sm py-3 rounded-xl">누적 시간</button>
    </div>
  </div>

  <script>
    const fsBtn = document.getElementById('fullscreenBtn');
    fsBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => console.log(err));
      } else {
        document.exitFullscreen();
      }
    });
  </script>
</body>
</html>
