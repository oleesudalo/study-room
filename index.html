<!doctype html>
<html lang="ko">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동명 열공 프로젝트</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .dot-decoration {
            width: 80px; height: 80px; border-radius: 50%; position: absolute; opacity: 0.3;
        }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen w-full">
  <div class="relative w-full max-w-lg mx-auto overflow-hidden" style="min-height: calc(100 * min(var(--vh, 1vh), 1vh));">
   <!-- Decorative circles -->
   <div class="dot-decoration bg-blue-300" style="top:-20px;left:-20px;width:100px;height:100px;"></div>
   <div class="dot-decoration bg-pink-200" style="top:60px;right:-30px;width:70px;height:70px;"></div>
   <div class="dot-decoration bg-teal-200" style="top:300px;left:-40px;width:90px;height:90px;"></div>
   <div class="dot-decoration bg-yellow-200" style="bottom:200px;right:-20px;width:60px;height:60px;"></div>
   <div class="relative z-10 px-3 py-4 flex flex-col items-center">
    <!-- Badge -->
    <header class="mb-2">
     <span data-template-id="badge" class="canva-tag inline-block px-4 py-1 rounded-full text-sm font-medium border-2"></span>
    </header><!-- Title -->
    <h1 data-template-id="main-title" class="canva-text text-center font-black leading-tight mb-1"></h1><!-- Subtitle -->
    <p data-template-id="subtitle" class="canva-text text-center text-xs mb-3"></p><!-- Schedule Section -->
    <section class="w-full mb-3">
     <div class="flex items-center justify-center gap-2 mb-2">
      <span class="text-lg">📅</span>
      <h2 data-template-id="schedule-label" class="canva-text font-bold text-center"></h2>
     </div>
     <div data-template-id="schedule-card" class="canva-card rounded-xl p-3 text-center shadow-sm">
      <p data-template-id="schedule-dates" class="canva-text font-bold text-base mb-1"></p>
      <p data-template-id="schedule-duration" class="canva-text text-xs mb-1"></p>
      <p data-template-id="schedule-time" class="canva-text text-xs"></p>
     </div>
    </section><!-- Location Section -->
    <section class="w-full mb-3">
     <div class="flex items-center justify-center gap-2 mb-2">
      <span class="text-lg">📍</span>
      <h2 data-template-id="location-label" class="canva-text font-bold text-center"></h2>
     </div>
     <div class="grid grid-cols-2 gap-2">
      <div data-template-id="location-card-1" class="canva-card rounded-xl p-2 text-center shadow-sm">
       <p class="text-lg mb-1">🏫</p>
       <p data-template-id="location-1-name" class="canva-text font-bold text-xs"></p>
      </div>
      <div data-template-id="location-card-2" class="canva-card rounded-xl p-2 text-center shadow-sm">
       <p class="text-lg mb-1">📚</p>
       <p data-template-id="location-2-name" class="canva-text font-bold text-xs"></p>
      </div>
     </div>
    </section><!-- Rules Section -->
    <section class="w-full mb-3">
     <div class="flex items-center justify-center gap-2 mb-2">
      <span class="text-lg">⬇️</span>
      <h2 data-template-id="rules-label" class="canva-text font-bold text-center"></h2>
     </div>
     <div class="space-y-1">
      <div data-template-id="rule-1-card" class="canva-card rounded-xl p-2 shadow-sm">
       <p data-template-id="rule-1-title" class="canva-text font-bold text-xs mb-1"></p>
       <p data-template-id="rule-1-desc" class="canva-text text-xs"></p>
      </div>
      <div data-template-id="rule-2-card" class="canva-card rounded-xl p-2 shadow-sm">
       <p data-template-id="rule-2-title" class="canva-text font-bold text-xs mb-1"></p>
       <p data-template-id="rule-2-desc" class="canva-text text-xs"></p>
      </div>
     </div>
    </section><!-- Warning -->
    <div data-template-id="warning-card" class="canva-card w-full rounded-xl p-2 mb-3 shadow-sm text-center">
     <p data-template-id="warning-title" class="canva-text font-bold text-xs mb-1"></p>
     <p data-template-id="warning-desc" class="canva-text text-xs"></p>
    </div><!-- Reward Section -->
    <section class="w-full mb-4">
     <div data-template-id="reward-card" class="canva-card rounded-xl p-3 text-center shadow-sm">
      <p data-template-id="reward-label" class="canva-text font-bold mb-1"></p>
      <p data-template-id="reward-text" class="canva-text font-bold mb-1"></p>
      <p data-template-id="reward-subtext" class="canva-text text-xs"></p>
     </div>
    </section><!-- Action Buttons -->
    <section class="w-full grid grid-cols-4 gap-2"><button data-template-id="button-checkin" class="canva-button rounded-lg py-2 px-2 text-xs font-bold shadow-sm hover:opacity-90 transition"></button> <button data-template-id="button-checkout" class="canva-button rounded-lg py-2 px-2 text-xs font-bold shadow-sm hover:opacity-90 transition"></button> <button data-template-id="button-time" class="canva-button rounded-lg py-2 px-2 text-xs font-bold shadow-sm hover:opacity-90 transition"></button> <button data-template-id="button-ranking" class="canva-button rounded-lg py-2 px-2 text-xs font-bold shadow-sm hover:opacity-90 transition"></button>
    </section>
   </div>
  </div>
