<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>동명 열공 프로젝트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ============================================================================
    // ★ 여기에 Firebase 설정값을 다시 넣으세요! ★
    // ============================================================================
    const firebaseConfig = {
      // 본인의 설정값 그대로 유지
      apiKey: "AIzaSyAcY8A8MvbKoeh8H1FVwsxkmTkKT4gii-U",
  authDomain: "dongmyeong-study.firebaseapp.com",
  projectId: "dongmyeong-study",
  storageBucket: "dongmyeong-study.firebasestorage.app",
  messagingSenderId: "1072114866393",
  appId: "1:1072114866393:web:a162826ab92f7e610706c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.doc = doc;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
  </script>

  <style>
    body { background-color: #f0f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    .app-container { height: 100vh; width: 56.25vh; /* 9:16 비율 */ max-width: 100vw; background: white; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <!-- Main Container -->
  <div class="app-container">
    
    <!-- 전체화면 토글 버튼 (우측 상단) -->
    <button id="fullscreenBtn" class="absolute top-4 right-4 z-[60] bg-black/10 hover:bg-black/20 p-2 rounded-full transition-colors">
      <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
    </button>
    
    <!-- Poster Content -->
    <div class="flex-grow py-4 px-6 flex flex-col items-center justify-evenly text-center w-full overflow-hidden">
      
      <!-- Title Area -->
      <div class="flex flex-col items-center gap-1">
        <div class="bg-[#3b82f6] text-white text-[10px] sm:text-xs font-bold py-1 px-4 rounded-full mb-1 tracking-widest shadow-sm">
          ✏️ STUDY PROJECT ✏️
        </div>
        <h1 class="text-2xl sm:text-3xl font-black text-[#1e3a8a] tracking-tight leading-tight">
          동명 열공 프로젝트
        </h1>
        <p class="text-gray-500 text-[10px] sm:text-xs font-medium">
          같이 공부하면 더 재밌어! 5일 완주 도전 🌟
        </p>
      </div>

      <!-- Schedule Box -->
      <div class="bg-[#1e4a9e] text-white w-full rounded-2xl p-4 shadow-md">
        <div class="text-blue-200 text-[10px] mb-1">🗓 일정</div>
        <div class="text-sm sm:text-lg font-bold mb-1">6월 29일(월) ~ 7월 3일(금)</div>
        <div class="text-[10px] sm:text-xs text-blue-100">매일 12:35 ~ 1:25 (50분)</div>
      </div>

      <!-- Locations -->
      <div class="w-full flex gap-3">
        <div class="flex-1 bg-green-50 border-t-4 border-green-600 rounded-xl p-2 text-center">
          <div class="font-bold text-green-900 text-xs mb-0.5">학생 자치회실</div>
        </div>
        <div class="flex-1 bg-blue-50 border-t-4 border-blue-600 rounded-xl p-2 text-center">
          <div class="font-bold text-blue-900 text-xs mb-0.5">학교 도서실</div>
        </div>
      </div>

      <!-- Rules -->
      <div class="w-full space-y-2">
        <div class="bg-green-50/70 border-l-4 border-green-500 rounded-r-lg p-2 text-left">
          <div class="font-bold text-gray-800 text-[11px]">🚫 친구 자리 맞추기 금지</div>
        </div>
        <div class="bg-blue-50/70 border-l-4 border-blue-500 rounded-r-lg p-2 text-left">
          <div class="font-bold text-gray-800 text-[11px]">🪑 자리 이탈 금지</div>
        </div>
        <div class="bg-red-50/70 border-l-4 border-red-500 rounded-r-lg p-2 text-left">
          <div class="font-bold text-gray-800 text-[11px]">🔴 경고 2회 시 강퇴</div>
        </div>
      </div>

      <!-- Reward -->
      <div class="w-full bg-pink-50 border-t-4 border-[#b92b3a] rounded-xl p-3 text-center">
        <div class="text-[10px] font-bold text-[#b92b3a] tracking-widest mb-1">🎁 SPECIAL REWARD</div>
        <div class="text-sm font-black text-gray-800">5일 개근 → 응원 간식 선물 🍭</div>
      </div>

    </div>

    <!-- Bottom Action Buttons -->
    <div class="w-full border-t border-gray-100 p-3 flex gap-2">
      <button onclick="openModal('inout')" class="flex-1 bg-blue-600 text-white font-bold text-sm py-3 rounded-xl">자습실 이용</button>
      <button onclick="openModal('record')" class="flex-[0.8] bg-emerald-600 text-white font-bold text-sm py-3 rounded-xl">누적 시간</button>
    </div>
  </div>

  <script>
    // 전체화면 토글 기능
    const fsBtn = document.getElementById('fullscreenBtn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log(`Error: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    });

    // 기존 로직들... (생략된 부분은 이전 코드와 동일하게 유지하세요)
    function openModal(type) { /* ... */ }
    function closeModal() { /* ... */ }
    // ... 나머지 함수들
  </script>
</body>
</html>
