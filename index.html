<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>동명 열공 프로젝트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    button { touch-action: manipulation; cursor: pointer; }
    body { background-color: #f0f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    .app-container { height: 100vh; width: 56.25vh; max-width: 100vw; background: white; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcY8A8MvbKoeh8H1FVwsxkmTkKT4gii-U",
      authDomain: "dongmyeong-study.firebaseapp.com",
      projectId: "dongmyeong-study",
      storageBucket: "dongmyeong-study.firebasestorage.app",
      messagingSenderId: "1072114866393",
      appId: "1:1072114866393:web:a162826ab92f7e610706c8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.toggleModal = (show, type) => { 
        document.getElementById('modalType').value = type;
        document.getElementById('resultArea').classList.add('hidden');
        document.getElementById('inputArea').classList.remove('hidden');
        
        if(show) {
            document.getElementById('name').value = '';
            document.getElementById('password').value = '';
            document.getElementById('studentNum').value = '';
            document.getElementById('classNum').value = '';
            document.getElementById('nameContainer').style.display = type === 'time' ? 'none' : 'block';
            document.getElementById('passwordContainer').style.display = type === 'time' ? 'none' : 'block';
        }
        document.getElementById('modal').style.display = show ? 'flex' : 'none'; 
    };

    window.showResult = (message) => {
        document.getElementById('inputArea').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('resultMessage').innerText = message;
    };

    window.processAction = async () => {
      const type = document.getElementById('modalType').value;
      const grade = document.getElementById('grade').value;
      const classNum = document.getElementById('classNum').value;
      const studentNum = document.getElementById('studentNum').value;
      const name = document.getElementById('name').value;
      const password = document.getElementById('password').value;
      
      const docId = `${grade}-${classNum}-${studentNum}`;
      const studentRef = doc(db, "students", docId);

      try {
        const snap = await getDoc(studentRef);
        if (type === 'time') {
            if (!snap.exists()) { showResult("등록된 학생 정보가 없습니다."); return; }
            const total = snap.data().totalMinutes || 0;
            showResult(`총 누적 시간: ${Math.floor(total / 60)}시간 ${total % 60}분`);
        } else {
            if (type === 'in') {
                if (snap.exists() && snap.data().status === "in") { showResult("이미 입실중입니다."); return; }
                await setDoc(studentRef, { name, grade, classNum, studentNum, password, status: "in", lastIn: new Date().toISOString(), totalMinutes: snap.exists() ? (snap.data().totalMinutes || 0) : 0 });
                showResult(name + "님, 입실 완료!");
            } else {
                if (!snap.exists() || snap.data().status !== "in") { showResult("입실 내역이 없습니다."); return; }
                if (snap.data().password !== password) { showResult("비밀번호가 다릅니다."); return; }
                const diff = Math.floor((new Date() - new Date(snap.data().lastIn)) / 60000);
                const newTotal = (snap.data().totalMinutes || 0) + diff;
                await setDoc(studentRef, { ...snap.data(), status: "out", totalMinutes: newTotal, lastOut: new Date().toISOString() });
                showResult("퇴실되었습니다!\n총 누적 시간: " + Math.floor(newTotal/60) + "시간 " + (newTotal%60) + "분");
            }
        }
      } catch (e) { showResult("오류: " + e.message); }
    };
  </script>
</head>
<body>
  <div class="app-container">
    <div class="flex-grow py-4 px-6 flex flex-col items-center justify-evenly text-center w-full overflow-hidden">
      <div class="bg-[#3b82f6] text-white text-[10px] font-bold py-1 px-4 rounded-full mb-1 tracking-widest shadow-sm">✏️ STUDY PROJECT ✏️</div>
      <h1 class="text-2xl font-black text-[#1e3a8a] tracking-tight leading-tight">동명 열공 프로젝트</h1>
      <p class="text-gray-500 text-[10px] font-medium">같이 공부하면 더 재밌어! 5일 완주 도전 🌟</p>
      
      <div class="bg-[#1e4a9e] text-white w-full rounded-2xl p-4 shadow-md">
        <div class="text-blue-200 text-[10px] mb-1">🗓 일정</div>
        <div class="text-sm font-bold mb-1">6월 29일(월) ~ 7월 3일(금)</div>
        <div class="text-[10px] text-blue-100">5일간 진행 / 매일 12:35 ~ 1:25 (50분)</div>
      </div>
      
      <div class="w-full flex gap-3">
        <div class="flex-1 bg-green-50 border-t-4 border-green-600 rounded-xl p-2 text-center">
          <div class="font-bold text-green-900 text-[11px]">학생 자치회실</div>
          <div class="text-[9px] text-green-600">Student Council Room</div>
        </div>
        <div class="flex-1 bg-blue-50 border-t-4 border-blue-600 rounded-xl p-2 text-center">
          <div class="font-bold text-blue-900 text-[11px]">학교 도서실</div>
          <div class="text-[9px] text-blue-600">School Library</div>
        </div>
      </div>
      
      <div class="w-full space-y-2 text-left">
        <div class="text-[10px] font-bold text-gray-600">⚠️ 참가 규칙</div>
        <div class="bg-green-50/70 p-2 rounded-r-lg border-l-4 border-green-500 text-[10px]">🚫 친구 자리 맞추기 금지</div>
        <div class="bg-blue-50/70 p-2 rounded-r-lg border-l-4 border-blue-500 text-[10px]">🪑 자리 이탈 금지</div>
        <div class="bg-red-50/70 p-2 rounded-r-lg border-l-4 border-red-500 text-[10px]">🔴 경고 2회 시 강퇴</div>
      </div>
    </div>

    <div class="w-full border-t border-gray-100 p-3 flex gap-2">
      <button onclick="toggleModal(true, 'in')" class="flex-1 bg-blue-600 text-white font-bold text-sm py-3 rounded-xl">입실</button>
      <button onclick="toggleModal(true, 'out')" class="flex-1 bg-red-500 text-white font-bold text-sm py-3 rounded-xl">퇴실</button>
      <button onclick="toggleModal(true, 'time')" class="flex-1 bg-emerald-600 text-white font-bold text-sm py-3 rounded-xl">누적 시간</button>
    </div>
  </div>

  <div id="modal" class="absolute inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
    <input type="hidden" id="modalType">
    <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-3">
      <div id="inputArea">
        <h2 class="font-bold text-lg mb-2">정보 입력</h2>
        <div class="flex gap-2">
          <select id="grade" class="flex-1 p-2 border rounded"><option>1학년</option><option>2학년</option><option>3학년</option></select>
          <input type="number" id="classNum" placeholder="반" class="w-16 p-2 border rounded">
          <input type="number" id="studentNum" placeholder="번호" class="w-16 p-2 border rounded">
        </div>
        <div id="nameContainer"><input type="text" id="name" placeholder="이름" class="w-full p-2 border rounded"></div>
        <div id="passwordContainer"><input type="password" id="password" placeholder="비밀번호(4자리)" class="w-full p-2 border rounded"></div>
        <div class="flex gap-2 pt-2">
          <button onclick="processAction()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold">확인</button>
          <button onclick="toggleModal(false)" class="flex-1 bg-gray-200 py-2 rounded">취소</button>
        </div>
      </div>
      <div id="resultArea" class="hidden text-center space-y-4">
        <h2 class="font-bold text-lg">결과 확인</h2>
        <div id="resultMessage" class="p-4 bg-gray-50 rounded-lg text-sm font-medium text-gray-800 whitespace-pre-line"></div>
        <button onclick="toggleModal(false)" class="w-full bg-blue-600 text-white py-2 rounded font-bold">확인</button>
      </div>
    </div>
  </div>
</body>
</html>
